<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="">
    <meta name="keywords" content="">
    <meta name="author" content="">
    <title>Portfolio</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- AOS Animate on Scroll -->
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

    <!-- ===================== NAVBAR ===================== -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top" id="mainNav">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#" id="navBrand"></a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" id="navLinks"></ul>
            </div>
        </div>
    </nav>

    <!-- ===================== HERO SECTION ===================== -->
    <section id="home" class="hero-section d-flex align-items-center">
        <div class="hero-bg-particles" id="particles"></div>
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-7" data-aos="fade-right" data-aos-duration="1000">
                    <p class="hero-greeting" id="heroGreeting"></p>
                    <h1 class="hero-name" id="heroName"></h1>
                    <div class="hero-titles">
                        <span class="hero-title-static" id="heroTypingPrefix"></span>
                        <span class="hero-title-dynamic" id="typingText"> </span>
                        <span class="typing-cursor">|</span>
                    </div>
                    <p class="hero-description mt-4" id="heroDescription"></p>
                    <div class="hero-buttons mt-4" id="heroButtons"></div>
                    <div class="hero-socials mt-4" id="heroSocials"></div>
                </div>
                <div class="col-lg-5 text-center" data-aos="fade-left" data-aos-duration="1000">
                    <!-- Profile Picture -->
                    <div class="hero-profile-pic mb-4" id="heroProfilePic"></div>
                    <div class="hero-illustration">
                        <div class="code-window" id="codeWindow"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- ===================== ABOUT SECTION ===================== -->
    <section id="about" class="section-padding bg-dark-alt">
        <div class="container">
            <div class="section-header text-center" data-aos="fade-up">
                <h2 class="section-title" id="aboutTitle"></h2>
                <div class="section-divider"></div>
            </div>
            <div class="row mt-5 align-items-center">
                <div class="col-lg-6" data-aos="fade-right">
                    <div class="about-stats-grid" id="aboutStats"></div>
                </div>
                <div class="col-lg-6" data-aos="fade-left">
                    <h3 class="about-subtitle" id="aboutSubtitle"></h3>
                    <div id="aboutParagraphs"></div>
                    <div class="about-highlights mt-4" id="aboutHighlights"></div>
                    <a href="#" class="btn btn-primary-custom mt-4" id="resumeBtn" download>
                        <i class="bi bi-download me-2"></i>Download Resume
                    </a>
                </div>
            </div>
        </div>
    </section>

    <!-- ===================== SKILLS SECTION ===================== -->
    <section id="skills" class="section-padding">
        <div class="container">
            <div class="section-header text-center" data-aos="fade-up">
                <h2 class="section-title" id="skillsTitle"></h2>
                <div class="section-divider"></div>
                <p class="section-subtitle" id="skillsSubtitle"></p>
            </div>
            <div class="row mt-5" id="skillCategories"></div>
            <!-- Skill Progress Bars -->
            <div class="row mt-5" id="skillProgressBars"></div>
        </div>
    </section>

    <!-- ===================== CERTIFICATIONS SECTION ===================== -->
    <section id="certifications" class="section-padding">
        <div class="container">
            <div class="section-header text-center" data-aos="fade-up">
                <h2 class="section-title" id="certsTitle"></h2>
                <div class="section-divider"></div>
                <p class="section-subtitle" id="certsSubtitle"></p>
            </div>
            <div class="row mt-5" id="certsGrid"></div>
        </div>
    </section>

    <!-- ===================== PROJECTS SECTION ===================== -->
    <section id="projects" class="section-padding bg-dark-alt">
        <div class="container">
            <div class="section-header text-center" data-aos="fade-up">
                <h2 class="section-title" id="projectsTitle"></h2>
                <div class="section-divider"></div>
                <p class="section-subtitle" id="projectsSubtitle"></p>
            </div>
            <!-- Filter Buttons -->
            <div class="project-filters text-center mt-4" data-aos="fade-up" id="projectFilters"></div>
            <!-- Projects Grid -->
            <div class="row mt-5" id="projectsGrid"></div>
        </div>
    </section>

    <!-- ===================== EXPERIENCE SECTION ===================== -->
    <section id="experience" class="section-padding">
        <div class="container">
            <div class="section-header text-center" data-aos="fade-up">
                <h2 class="section-title" id="expTitle"></h2>
                <div class="section-divider"></div>
            </div>
            <div class="timeline mt-5" id="experienceTimeline"></div>
        </div>
    </section>

    <!-- ===================== CONTACT SECTION ===================== -->
    <section id="contact" class="section-padding bg-dark-alt">
        <div class="container">
            <div class="section-header text-center" data-aos="fade-up">
                <h2 class="section-title" id="contactTitle"></h2>
                <div class="section-divider"></div>
                <p class="section-subtitle" id="contactSubtitle"></p>
            </div>
            <div class="row mt-5">
                <!-- Contact Info -->
                <div class="col-lg-5" data-aos="fade-right">
                    <div class="contact-info-card" id="contactInfoCard"></div>
                </div>
                <!-- Contact Form -->
                <div class="col-lg-7" data-aos="fade-left">
                    <div class="contact-form-card">
                        <form id="contactForm">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="name" class="form-label">Your Name</label>
                                    <input type="text" class="form-control custom-input" id="name" name="name" required placeholder="John Doe">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="email" class="form-label">Your Email</label>
                                    <input type="email" class="form-control custom-input" id="email" name="email" required placeholder="john@example.com">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="subject" class="form-label">Subject</label>
                                <input type="text" class="form-control custom-input" id="subject" name="subject" required placeholder="Project Collaboration">
                            </div>
                            <div class="mb-4">
                                <label for="message" class="form-label">Message</label>
                                <textarea class="form-control custom-input" id="message" name="message" rows="5" required placeholder="Tell me about your project..."></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary-custom w-100">
                                <i class="bi bi-send me-2"></i>Send Message
                            </button>
                            <div id="formStatus" class="mt-3 text-center" style="display:none;"></div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- ===================== FOOTER ===================== -->
    <footer class="footer-section">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-4">
                    <a class="footer-brand" href="#" id="footerBrand"></a>
                </div>
                <div class="col-md-4 text-center">
                    <p class="footer-text mb-0" id="footerCopyright"></p>
                </div>
                <div class="col-md-4 text-md-end">
                    <div class="footer-socials" id="footerSocials"></div>
                </div>
            </div>
        </div>
    </footer>

    <!-- Back to Top Button -->
    <a href="#home" class="back-to-top" id="backToTop" aria-label="Back to top">
        <i class="bi bi-arrow-up"></i>
    </a>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- AOS JS -->
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    <!-- Portfolio Data -->
    <script src="data/portfolio-data.js"></script>
    <!-- Custom JS -->
    <script src="js/main.js"></script>
</body>
</html>
